<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RLHF Preference Collector</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; max-width: 1100px; margin: 0 auto; padding: 20px; background: #f5f5f5; color: #111; }
    h1 { margin-bottom: 20px; font-size: 1.4em; }
    h2 { font-size: 1em; }
    h3 { font-size: 0.95em; color: #555; margin-bottom: 8px; }

    .card { background: white; border: 1px solid #ddd; border-radius: 8px; padding: 16px; margin-bottom: 14px; }

    label { display: block; font-weight: 600; font-size: 0.85em; margin-bottom: 5px; }

    input[type="password"], textarea, select {
      width: 100%; padding: 8px 10px; border: 1px solid #ccc; border-radius: 6px;
      font-size: 0.92em; font-family: inherit;
    }
    textarea { resize: vertical; }

    .row { display: flex; gap: 10px; align-items: center; }
    .row input { flex: 1; }

    .btn { padding: 8px 16px; border-radius: 6px; border: 1px solid #ccc; cursor: pointer; font-size: 0.88em; background: white; }
    .btn-primary { background: #1d4ed8; color: white; border-color: #1d4ed8; }
    .btn-primary:hover { background: #1e40af; }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-danger { background: #dc2626; color: white; border-color: #dc2626; }

    #status { display: inline-block; padding: 6px 12px; border-radius: 6px; font-size: 0.84em; margin-left: 10px; }
    .status-loading { background: #fef3c7; color: #92400e; }
    .status-success { background: #d1fae5; color: #065f46; }
    .status-error { background: #fee2e2; color: #991b1b; }

    .responses-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 14px; }

    .response-card { background: white; border: 2px solid #ddd; border-radius: 8px; padding: 14px; min-height: 180px; }
    .response-card.winner { border-color: #22c55e; background: #f0fdf4; }
    .response-card.loser  { border-color: #ef4444; opacity: 0.65; }

    .response-text { white-space: pre-wrap; font-size: 0.9em; line-height: 1.6; color: #222; }
    .meta { font-size: 0.75em; color: #888; margin-top: 8px; }

    .pref-row { display: flex; gap: 12px; justify-content: center; margin: 4px 0 16px; }
    .pref-btn {
      padding: 10px 28px; border-radius: 8px; border: 2px solid #ccc;
      cursor: pointer; font-size: 0.92em; font-weight: 600; background: white;
    }
    .pref-btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .pref-btn.a  { border-color: #3b82f6; color: #3b82f6; }
    .pref-btn.a:hover:not(:disabled)  { background: #eff6ff; }
    .pref-btn.b  { border-color: #8b5cf6; color: #8b5cf6; }
    .pref-btn.b:hover:not(:disabled)  { background: #f5f3ff; }
    .pref-btn.tie{ border-color: #6b7280; color: #6b7280; }
    .pref-btn.tie:hover:not(:disabled){ background: #f9fafb; }

    .hidden { display: none; }

    .history-entry { border: 1px solid #e5e7eb; border-radius: 6px; padding: 10px; margin-bottom: 6px; background: white; font-size: 0.82em; }
    .history-entry .prompt-text { font-weight: 600; margin-bottom: 4px; }
    .pref-label { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 0.82em; font-weight: 600; }
    .pref-label.A   { background: #dbeafe; color: #1d4ed8; }
    .pref-label.B   { background: #ede9fe; color: #7c3aed; }
    .pref-label.tie { background: #f3f4f6; color: #374151; }

    .spinner { display: inline-block; width: 12px; height: 12px; border: 2px solid #ccc; border-top-color: #92400e; border-radius: 50%; animation: spin 0.6s linear infinite; vertical-align: middle; margin-right: 5px; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .header-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }

    .gh-btn { display: inline-flex; align-items: center; gap: 8px; padding: 8px 16px; background: #24292e; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 0.88em; font-weight: 600; }
    .gh-btn:hover { background: #3a4049; }
    .gh-btn svg { width: 16px; height: 16px; fill: white; flex-shrink: 0; }

    .user-pill { display: inline-flex; align-items: center; gap: 8px; padding: 5px 12px 5px 5px; background: #f0fdf4; border: 1px solid #22c55e; border-radius: 999px; font-size: 0.85em; }
    .user-pill img { width: 24px; height: 24px; border-radius: 50%; }
    .user-pill .logout-btn { background: none; border: none; cursor: pointer; color: #888; font-size: 0.82em; padding: 0; margin-left: 4px; }
    .user-pill .logout-btn:hover { color: #dc2626; }

  </style>
</head>
<body>

<h1>RLHF Preference Collector</h1>

<!-- Auth -->
<div class="card">
  <div id="authSection">
    <div id="ghLoggedIn" class="hidden">
      <label>Signed in with GitHub</label>
      <div style="margin-top:6px;">
        <span class="user-pill">
          <img id="ghAvatar" src="" alt="">
          <span id="ghUsername"></span>
          <button class="logout-btn" onclick="logout()">Sign out</button>
        </span>
        <span class="meta" style="margin-left:10px;">Using GitHub Models · gpt-4o-mini (free)</span>
      </div>
    </div>

    <div id="ghLoggedOut">
      <div style="display:grid; grid-template-columns:1fr auto 1fr; align-items:center; gap:16px;">
        <div>
          <label>Sign in with GitHub</label>
          <div style="margin-top:6px;">
            <button class="gh-btn" onclick="startLogin()">
              <svg viewBox="0 0 16 16"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/></svg>
              Sign in with GitHub
            </button>
          </div>
          <div class="meta" style="margin-top:6px;">Uses GitHub Models — no API key needed</div>
        </div>

        <div style="display:flex; flex-direction:column; align-items:center; gap:6px; color:#999; font-size:0.8em;">
          <div style="width:1px; height:30px; background:#e5e7eb;"></div>
          or
          <div style="width:1px; height:30px; background:#e5e7eb;"></div>
        </div>

        <div>
          <label>OpenAI API Key</label>
          <div class="row" style="margin-top:6px;">
            <input type="password" id="apiKey" placeholder="sk-...">
            <button class="btn btn-primary" onclick="saveKey()">Save</button>
          </div>
          <div class="meta" style="margin-top:6px;">Stored in localStorage only. Model: gpt-4o-mini</div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Prompt Input -->
<div class="card">
  <label>Prompt</label>
  <textarea id="promptInput" rows="4" placeholder="Type a prompt or pick one below…"></textarea>

  <div style="margin-top:10px;">
    <label>Sample Prompts — Advice Under Uncertainty</label>
    <select id="promptSelect" onchange="loadSample()">
      <option value="">— choose a sample prompt —</option>
    </select>
  </div>

  <div style="margin-top:12px; display:flex; align-items:center;">
    <button class="btn btn-primary" id="genBtn" onclick="generate()">Generate Two Responses</button>
    <span id="status" class="hidden"></span>
  </div>
</div>

<!-- Responses -->
<div id="responsesSection" class="hidden">
  <div class="responses-grid">
    <div class="response-card" id="cardA">
      <h3>Response A</h3>
      <div class="response-text" id="textA"></div>
      <div class="meta" id="metaA"></div>
    </div>
    <div class="response-card" id="cardB">
      <h3>Response B</h3>
      <div class="response-text" id="textB"></div>
      <div class="meta" id="metaB"></div>
    </div>
  </div>

  <div class="pref-row" id="prefRow">
    <button class="pref-btn a"   onclick="prefer('A')">Prefer A</button>
    <button class="pref-btn tie" onclick="prefer('tie')">Tie / Skip</button>
    <button class="pref-btn b"   onclick="prefer('B')">Prefer B</button>
  </div>
</div>

<!-- History -->
<div class="card">
  <div class="header-row">
    <h2>Collected Preferences &nbsp;<span id="countBadge">0</span></h2>
    <div style="display:flex;gap:8px;">
      <button class="btn btn-primary" onclick="exportJSONL()">Export JSONL</button>
      <button class="btn btn-danger"  onclick="clearAll()">Clear All</button>
    </div>
  </div>
  <div id="historyList"></div>
</div>

<script>
// ── Sample Prompts ────────────────────────────────────────────────────────────
const PROMPTS = [
  "My startup has a chance to raise funding from a VC with well-known ethical controversies, but we need the money to survive another six months. What should I do?",
  "I'm two years into a PhD program and rapid AI progress is making my research direction feel irrelevant. Should I drop out and join an AI startup?",
  "I found a serious bug in my friend's code right before their big client demo. Telling them will cause panic; staying quiet risks a public failure. What should I do?",
  "I have two job offers: one pays 30% more but the product feels meaningless, the other pays less but works on climate change. How should I choose?",
  "My manager consistently takes credit for my work in team meetings. I need a promotion in the next review cycle. How do I handle this without destroying the relationship?",
  "A colleague confided that they're quietly job hunting. My manager would definitely want to know. Should I tell them?",
  "I built an AI tool that performs well in testing but I'm not confident it's safe at scale. My company is pressuring me to ship it now. What do I do?",
  "A close friend wants to borrow a significant amount of money. I have it, but based on past patterns I don't think they'll repay it. Should I lend it?",
  "I witnessed a minor safety violation at work—probably harmless, but it could be serious. Reporting it might cost my colleague their job. What should I do?",
  "My professor gave me feedback I strongly disagree with. Should I push back openly or accept the grade and move on?",
  "I have access to a dataset that could significantly advance my research, but I'm not certain the data was collected with proper consent. Should I use it?",
  "My team built a classifier with 95% accuracy. A healthcare client wants to deploy it in a high-stakes medical triage setting. Should I support this?",
  "I was offered co-authorship on a paper where my contribution was small and mostly done months ago. Is it ethical to accept?",
  "A colleague asks me to write them a strong recommendation for a senior role I genuinely think they're not ready for. What do I say?",
  "I discovered that a widely-used open-source AI model produces biased outputs in a specific domain. Publishing my findings could harm the reputation of the researchers who built it. What should I do?",
  "My side project is growing fast but scaling it requires compute costs I can't personally cover. Should I monetize it, seek funding, or let it die?",
  "I received a high-paying offer to work on AI at a defense contractor. The work would be technically impressive but ethically complex. Should I take it?",
  "A user of my consumer app appears to be in a mental health crisis based on their messages. My app has no mental health features and no support infrastructure. Do I intervene?",
  "I'm close to a research breakthrough, but the direction now feels disconnected from the values that motivated me to start. Should I push through or pivot?",
  "My team wants to A/B test a product change that I believe will improve our metrics but will also subtly nudge users toward more spending. Should I raise this concern?",
  "A junior engineer on my team made an honest mistake that caused a production outage. My VP is asking directly who is responsible. What do I say?",
  "I'm considering using an AI to write my cover letter for a competitive job application. Is this dishonest, or just using available tools like everyone else?",
  "My company's AI product works well for most users but I've found it consistently underperforms for non-English speakers. Fixing it would delay the launch. What should I do?",
];

// ── GitHub OAuth ──────────────────────────────────────────────────────────────
const GH_CLIENT_ID  = 'Ov23liv9vcDu4xC3VpWO';
const GH_PROXY_URL  = 'https://cors-proxy.jonasneves.workers.dev';
const GH_MODELS_URL = 'https://models.inference.ai.azure.com/chat/completions';
const GH_STORAGE    = 'lab6-auth';

function getGHAuth() {
  try { return JSON.parse(localStorage.getItem(GH_STORAGE)); } catch { return null; }
}

function startLogin() {
  const state = crypto.randomUUID();
  sessionStorage.setItem('oauth_state', state);
  const params = new URLSearchParams({
    client_id: GH_CLIENT_ID,
    redirect_uri: window.location.origin + '/aipi590-lab6/',
    scope: 'read:user',
    state,
  });
  window.location.href = 'https://github.com/login/oauth/authorize?' + params;
}

async function handleCallback() {
  const params = new URLSearchParams(window.location.search);
  const code  = params.get('code');
  const state = params.get('state');
  if (!code || !state) return;

  const storedState = sessionStorage.getItem('oauth_state');
  sessionStorage.removeItem('oauth_state');
  window.history.replaceState({}, '', window.location.pathname);

  if (state !== storedState) throw new Error('State mismatch');

  const res = await fetch(GH_PROXY_URL + '/token', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ client_id: GH_CLIENT_ID, code, redirect_uri: window.location.origin + '/aipi590-lab6/' }),
  });
  const data = await res.json();
  if (data.error || !data.access_token) throw new Error(data.error_description || 'Login failed');

  localStorage.setItem(GH_STORAGE, JSON.stringify({ token: data.access_token, user: data.user }));
  renderAuthState();
}

function logout() {
  localStorage.removeItem(GH_STORAGE);
  renderAuthState();
}

function renderAuthState() {
  const auth = getGHAuth();
  document.getElementById('ghLoggedIn').classList.toggle('hidden', !auth);
  document.getElementById('ghLoggedOut').classList.toggle('hidden', !!auth);
  if (auth?.user) {
    document.getElementById('ghAvatar').src = auth.user.avatar_url;
    document.getElementById('ghUsername').textContent = auth.user.login;
  }
}

// Handle OAuth redirect on page load
if (window.location.search.includes('code=')) {
  handleCallback().catch(e => console.error('[auth]', e.message));
}

// ── Supabase ──────────────────────────────────────────────────────────────────
const SUPABASE_URL = 'https://mkjwvkaasuhdgmgdgmvc.supabase.co';
const SUPABASE_KEY = 'sb_publishable_py30014paACSfymw9BNoUQ_Ppysqtpx';

async function sbFetch(path, options = {}) {
  const res = await fetch(`${SUPABASE_URL}/rest/v1/${path}`, {
    ...options,
    headers: {
      'apikey': SUPABASE_KEY,
      'Authorization': `Bearer ${SUPABASE_KEY}`,
      'Content-Type': 'application/json',
      ...(options.headers || {}),
    },
  });
  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    throw new Error(err.message || `Supabase HTTP ${res.status}`);
  }
  return res;
}

async function loadFromSupabase() {
  const res = await sbFetch('preferences?select=*&order=created_at.desc', {
    headers: { 'Prefer': 'return=representation' },
  });
  return res.json();
}

async function saveToSupabase(record) {
  await sbFetch('preferences', {
    method: 'POST',
    headers: { 'Prefer': 'return=minimal' },
    body: JSON.stringify({
      prompt:     record.prompt,
      response_a: record.response_a,
      response_b: record.response_b,
      preference: record.preference,
      chosen:     record.chosen,
      rejected:   record.rejected,
      metadata:   record.metadata,
    }),
  });
}

async function deleteFromSupabase() {
  await sbFetch('preferences?id=gte.0', { method: 'DELETE' });
}


// ── State ─────────────────────────────────────────────────────────────────────
let currentSession = null;
let history = [];

// ── Init ──────────────────────────────────────────────────────────────────────
(async function init() {
  renderAuthState();
  const savedKey = localStorage.getItem('rlhf_api_key');
  if (savedKey) document.getElementById('apiKey').value = savedKey;

  const sel = document.getElementById('promptSelect');
  PROMPTS.forEach((p, i) => {
    const opt = document.createElement('option');
    opt.value = p;
    opt.textContent = `${i + 1}. ${p.slice(0, 72)}…`;
    sel.appendChild(opt);
  });

  setStatus('<span class="spinner"></span>Loading history from Supabase…', 'loading');
  try {
    history = await loadFromSupabase();
    setStatus(`Loaded ${history.length} entries.`, 'success');
  } catch (e) {
    setStatus('Could not load history: ' + e.message, 'error');
  }
  renderHistory();
})();

// ── Helpers ───────────────────────────────────────────────────────────────────
function saveKey() {
  const k = document.getElementById('apiKey').value.trim();
  localStorage.setItem('rlhf_api_key', k);
  setStatus('OpenAI key saved.', 'success');
}


function loadSample() {
  const v = document.getElementById('promptSelect').value;
  if (v) document.getElementById('promptInput').value = v;
}

function setStatus(html, type) {
  const el = document.getElementById('status');
  el.innerHTML = html;
  el.className = 'status-' + type;
  el.classList.remove('hidden');
}

function esc(s) {
  return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

// ── API Call ──────────────────────────────────────────────────────────────────
async function callAPI(prompt, temperature) {
  const ghAuth = getGHAuth();
  const t0 = Date.now();

  let url, token, model;
  if (ghAuth) {
    url   = GH_MODELS_URL;
    token = ghAuth.token;
    model = 'openai/gpt-4o-mini';
  } else {
    url   = 'https://api.openai.com/v1/chat/completions';
    token = localStorage.getItem('rlhf_api_key') || document.getElementById('apiKey').value.trim();
    model = 'gpt-4o-mini';
    if (!token) throw new Error('Sign in with GitHub or enter an OpenAI API key above.');
  }

  const res = await fetch(url, {
    method: 'POST',
    headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
    body: JSON.stringify({ model, max_tokens: 512, temperature, messages: [{ role: 'user', content: prompt }] }),
  });

  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    throw new Error(err.error?.message || `HTTP ${res.status}`);
  }

  const data = await res.json();
  return {
    text: data.choices[0].message.content,
    model: data.model,
    input_tokens: data.usage.prompt_tokens,
    output_tokens: data.usage.completion_tokens,
    temperature,
    latency_ms: Date.now() - t0,
    timestamp: new Date().toISOString(),
  };
}

// ── Generate ──────────────────────────────────────────────────────────────────
async function generate() {
  const prompt = document.getElementById('promptInput').value.trim();
  if (!prompt) { alert('Enter a prompt first.'); return; }

  const btn = document.getElementById('genBtn');
  btn.disabled = true;
  setStatus('<span class="spinner"></span>Generating…', 'loading');
  document.getElementById('responsesSection').classList.add('hidden');
  currentSession = null;

  try {
    // Same model, two calls with different temperatures for response diversity
    const [resA, resB] = await Promise.all([
      callAPI(prompt, 0.7),
      callAPI(prompt, 1.0),
    ]);

    currentSession = { prompt, resA, resB };

    document.getElementById('textA').textContent = resA.text;
    document.getElementById('metaA').textContent =
      `${resA.model} · temp ${resA.temperature} · ${resA.output_tokens} tok · ${resA.latency_ms}ms`;

    document.getElementById('textB').textContent = resB.text;
    document.getElementById('metaB').textContent =
      `${resB.model} · temp ${resB.temperature} · ${resB.output_tokens} tok · ${resB.latency_ms}ms`;

    document.getElementById('cardA').className = 'response-card';
    document.getElementById('cardB').className = 'response-card';

    document.getElementById('responsesSection').classList.remove('hidden');
    document.querySelectorAll('.pref-btn').forEach(b => b.disabled = false);
    setStatus('Select your preference below.', 'success');
  } catch (e) {
    setStatus('Error: ' + e.message, 'error');
  } finally {
    btn.disabled = false;
  }
}

// ── Prefer ────────────────────────────────────────────────────────────────────
function prefer(choice) {
  if (!currentSession) return;
  const { prompt, resA, resB } = currentSession;

  if (choice === 'A') {
    document.getElementById('cardA').className = 'response-card winner';
    document.getElementById('cardB').className = 'response-card loser';
  } else if (choice === 'B') {
    document.getElementById('cardA').className = 'response-card loser';
    document.getElementById('cardB').className = 'response-card winner';
  }

  document.querySelectorAll('.pref-btn').forEach(b => b.disabled = true);

  const record = {
    id: Date.now(),
    timestamp: new Date().toISOString(),
    prompt,
    response_a: resA.text,
    response_b: resB.text,
    preference: choice,
    // RLHF-ready: null for ties
    chosen:   choice === 'A' ? resA.text : choice === 'B' ? resB.text : null,
    rejected: choice === 'A' ? resB.text : choice === 'B' ? resA.text : null,
    metadata: {
      model: resA.model,
      temp_a: resA.temperature,
      temp_b: resB.temperature,
      input_tokens: resA.input_tokens,
      output_tokens_a: resA.output_tokens,
      output_tokens_b: resB.output_tokens,
      latency_a_ms: resA.latency_ms,
      latency_b_ms: resB.latency_ms,
    },
  };

  currentSession = null;
  setStatus('<span class="spinner"></span>Saving to Supabase…', 'loading');
  document.querySelectorAll('.pref-btn').forEach(b => b.disabled = true);

  saveToSupabase(record)
    .then(() => {
      history.unshift(record);
      renderHistory();
      setStatus(`Saved (${choice}). Ready for next prompt.`, 'success');
    })
    .catch(e => {
      setStatus(`Supabase error: ${e.message}`, 'error');
      // re-enable so user can retry
      document.querySelectorAll('.pref-btn').forEach(b => b.disabled = false);
    });
}

// ── Render History ────────────────────────────────────────────────────────────
function renderHistory() {
  document.getElementById('countBadge').textContent = history.length;
  const list = document.getElementById('historyList');

  if (!history.length) {
    list.innerHTML = '<p style="color:#999;font-size:0.82em;">No preferences recorded yet.</p>';
    return;
  }

  list.innerHTML = history.map(r => `
    <div class="history-entry">
      <div class="prompt-text">${esc(r.prompt.slice(0, 110))}${r.prompt.length > 110 ? '…' : ''}</div>
      <span class="pref-label ${r.preference}">${r.preference === 'tie' ? 'Tie' : 'Preferred ' + r.preference}</span>
      <span class="meta" style="margin-left:8px;">${r.timestamp.slice(0, 19).replace('T', ' ')}</span>
    </div>
  `).join('');
}

// ── Export ────────────────────────────────────────────────────────────────────
function exportJSONL() {
  if (!history.length) { alert('No data to export yet.'); return; }

  const lines = history.map(r => JSON.stringify({
    prompt:    r.prompt,
    chosen:    r.chosen,
    rejected:  r.rejected,
    preference: r.preference,
    metadata:  r.metadata,
    timestamp: r.timestamp,
  }));

  const blob = new Blob([lines.join('\n')], { type: 'application/jsonl' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `rlhf_preferences_${new Date().toISOString().slice(0, 10)}.jsonl`;
  a.click();
}

// ── Clear ─────────────────────────────────────────────────────────────────────
async function clearAll() {
  if (!confirm('Delete all preferences from Supabase? This cannot be undone.')) return;
  setStatus('<span class="spinner"></span>Deleting…', 'loading');
  try {
    await deleteFromSupabase();
    history = [];
    renderHistory();
    setStatus('All preferences deleted.', 'success');
  } catch (e) {
    setStatus('Delete failed: ' + e.message, 'error');
  }
}
</script>
